version: '3.8'

services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: prismtrace-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
